<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Fátima ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Georgia, serif;
}

body{
    min-height:100vh;
    overflow-y:auto;
    overflow-x:hidden;
    background: linear-gradient(135deg,#ff4d6d,#ff8fab,#ffc2d1);
    position:relative;
    padding:10px;
}

/* corazones */
.heart{
    position:fixed;
    font-size:35px;
    opacity:0.7;
    animation: flotar 4s infinite ease-in-out;
    z-index:1;
}

.left1{left:5px; top:15%;}
.left2{left:8px; top:50%;}
.left3{left:5px; top:80%;}

.right1{right:5px; top:20%;}
.right2{right:8px; top:55%;}
.right3{right:5px; top:85%;}

@keyframes flotar{
    0%,100%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-15px);
    }
}

/* contenedor */
.container{
    width:100%;
    max-width:100%;
    margin:20px auto;
    padding:20px 15px;
    background: rgba(255,255,255,0.18);
    backdrop-filter: blur(10px);
    border-radius:20px;
    color:white;
    text-align:center;
    position:relative;
    z-index:2;
}

h1{
    font-size:1.8rem;
    margin-bottom:20px;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:25px;
    background:white;
    color:#ff4d6d;
    font-size:1rem;
    font-weight:bold;
    cursor:pointer;
}

#texto{
    margin-top:20px;
    font-size:1rem;
    line-height:1.5;
    white-space:pre-line;
    text-align:center;
    width:100%;
}

/* en pantallas grandes */
@media(min-width:768px){
    .container{
        max-width:800px;
        padding:30px;
    }

    #texto{
        font-size:1.2rem;
        line-height:1.8;
    }

    .heart{
        font-size:50px;
    }
}
</style>
</head>
<body>

<div class="heart left1">❤️</div>
<div class="heart left2">💖</div>
<div class="heart left3">💕</div>

<div class="heart right1">❤️</div>
<div class="heart right2">💖</div>
<div class="heart right3">💕</div>

<div class="container">
    <h1>Para Fátima ❤️</h1>
    
    <button onclick="mostrarTexto()">Presiona aquí mi amor</button>
    
    <div id="texto"></div>
</div>

<script>
const mensaje = `Fátima, quiero decirte algo muy claro y muy en serio.

Yo no soy como ese pendejo que te falló y te fue infiel, porque jamás haría algo así contigo.

Si estoy contigo es porque te quiero de verdad y valoro cada momento contigo.

Te prometo lealtad, respeto, sinceridad y amor real.

No quiero ser una herida más en tu historia...
quiero ser alguien que te haga sentir segura, amada y feliz.

Mi corazón siempre te va a elegir a ti ❤️`;

let i = 0;

function mostrarTexto(){
    document.querySelector("button").style.display = "none";

    function escribir(){
        if(i < mensaje.length){
            document.getElementById("texto").innerHTML += mensaje.charAt(i);
            i++;
            setTimeout(escribir,30);
        }
    }

    escribir();
}
</script>

</body>
</html>
