<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Fátima ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Georgia', serif;
}

body{
    min-height:100vh;
    overflow-y:scroll;
    overflow-x:hidden;
    background: linear-gradient(135deg,#ff4d6d,#ff8fab,#ffc2d1);
    position:relative;
    padding:30px 15px;
}

/* corazones laterales */
.heart{
    position:fixed;
    font-size:55px;
    color:rgba(255,255,255,0.8);
    animation: flotar 4s ease-in-out infinite;
    z-index:1;
}

.left1{left:10px; top:15%;}
.left2{left:20px; top:45%; animation-delay:1s;}
.left3{left:10px; top:75%; animation-delay:2s;}

.right1{right:10px; top:20%;}
.right2{right:20px; top:50%; animation-delay:1.5s;}
.right3{right:10px; top:78%; animation-delay:2.5s;}

@keyframes flotar{
    0%,100%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-20px);
    }
}

/* carta */
.container{
    width:90%;
    max-width:700px;
    margin:50px auto;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(15px);
    padding:30px;
    border-radius:25px;
    text-align:center;
    color:white;
    box-shadow:0 8px 30px rgba(0,0,0,0.2);
    position:relative;
    z-index:2;
}

h1{
    font-size:2rem;
    margin-bottom:20px;
}

button{
    padding:15px 30px;
    font-size:1.1rem;
    border:none;
    border-radius:30px;
    background:white;
    color:#ff4d6d;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}

#texto{
    margin-top:20px;
    font-size:1.2rem;
    line-height:1.8;
    white-space:pre-line;
}
</style>
</head>
<body>

<div class="heart left1">❤️</div>
<div class="heart left2">💖</div>
<div class="heart left3">💕</div>

<div class="heart right1">❤️</div>
<div class="heart right2">💖</div>
<div class="heart right3">💕</div>

<div class="container">
    <h1>Para Fátima ❤️</h1>

    <button onclick="mostrarTexto()">Presiona aquí mi amor</button>

    <div id="texto"></div>
</div>

<script>
const mensaje = `Fátima, quiero decirte algo muy claro y muy en serio.

Yo no soy como ese pendejo que te falló y te fue infiel, porque jamás haría algo así contigo. La infidelidad no demuestra amor, demuestra falta de respeto.

Si estoy contigo es porque te quiero de verdad y porque jamás jugaría contigo.

Te prometo lealtad.
Te prometo respeto.
Te prometo sinceridad.
Y te prometo amor real.

No quiero ser una herida más en tu historia...
quiero ser alguien que te haga sentir segura, amada y feliz.

Mi corazón siempre te va a elegir a ti ❤️`;

let i = 0;

function mostrarTexto(){
    document.querySelector("button").style.display="none";

    function escribir(){
        if(i < mensaje.length){
            document.getElementById("texto").innerHTML += mensaje.charAt(i);
            i++;
            setTimeout(escribir,40);
        }
    }

    escribir();
}
</script>

</body>
</html>
